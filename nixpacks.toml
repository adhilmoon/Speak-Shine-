[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "python3", "pkg-config"]

[phases.install]
cmds = [
  "npm install --ignore-scripts --omit=optional",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npx vite build"
]

[start]
cmd = "NODE_ENV=production node api/server.js"
