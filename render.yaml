services:
  # Full-Stack Service (Frontend + Backend)
  - type: web
    name: speak-shine
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: ENABLE_CODEC_VALIDATION
        value: true
      - key: ENABLE_VIRUS_SCAN
        value: true
      - key: ENABLE_CONTENT_MODERATION
        value: true
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://speak-shine.onrender.com
      - key: RENDER_EXTERNAL_URL
        value: https://speak-shine.onrender.com
    healthCheckPath: /api/health
    autoDeploy: true
